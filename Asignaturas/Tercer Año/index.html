<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(to right, #ece9e6, #ffffff);
        margin: 0;
        padding: 20px;
    }
    #content {
        max-width: 800px;
        margin: 0 auto;
        background: #ffffff;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        padding: 20px;
    }
    h1 {
        color: #333;
        font-size: 30px;
        margin-bottom: 20px;
    }
    ul#subjects {
        list-style-type: none;
        padding: 0;
        font-size: 25px;
    }
    ul#subjects li {
        margin-bottom: 15px;
    }
    ul#subjects li a {
        text-decoration: none;
        color: #333;
        font-weight: 500;
        transition: color 0.3s ease, text-decoration 0.3s ease;
    }
    ul#subjects li a:hover {
        text-decoration: underline;
        color: #0d47a1;
    }
    ul#subjects li span {
        margin-left: 10px;
        color: #666;
    }
</style>

<div id="content">
    <h1>3º curso del doble grado de Ingeniería Informática y ADE - <span id="year"></span></h1>
    <ul id="subjects"></ul>
</div>

<script>
    // Obtener el año actual
    var currentYear = new Date().getFullYear();
    document.getElementById('year').textContent = currentYear;

    // Añadir asignaturas al listado con enlaces
    var subjects = [
        { name: 'Dirección y Administración de Empresas', url: 'DAE.html' },
        { name: 'Sistemas Concurrentes y Distribuidos', url: 'SCD.html' },
        { name: 'Fundamentos de Redes', url: 'FR.html' },
        { name: 'Programación y Diseño Orientado a Objetos', url: 'PDOO.html' },
        { name: 'Econometría', url: 'ECO.html' },
        { name: 'Contabilidad Financiera 1', url: 'CF1.html' }
    ];
    var subjectsList = document.getElementById('subjects');
    subjects.forEach(function(subject) {
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.textContent = subject.name;
        a.href = subject.url;

        // Crear un span para mostrar el contador de visitas
        var span = document.createElement('span');

        // Obtener el contador de visitas del almacenamiento local
        var count = localStorage.getItem(subject.url) || 0;
        span.textContent = `👁️ ${count}`;

        // Incrementar el contador de visitas al hacer clic en el enlace
        a.addEventListener('click', function() {
            count++;
            localStorage.setItem(subject.url, count);
            span.textContent = `👁️ ${count}`;
        });

        li.appendChild(a);
        li.appendChild(span);
        subjectsList.appendChild(li);
    });
</script>

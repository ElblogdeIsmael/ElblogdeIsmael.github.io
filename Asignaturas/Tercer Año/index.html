<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #282c34;
        color: #abb2bf;
        margin: 0;
        padding: 20px;
    }
    #content {
        max-width: 800px;
        margin: 0 auto;
        background: #21252b;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        padding: 20px;
    }
    h1 {
        color: #61afef;
        font-size: 30px;
        margin-bottom: 20px;
    }
    ul#subjects {
        list-style-type: none;
        padding: 0;
        font-size: 25px;
    }
    ul#subjects li {
        margin-bottom: 15px;
    }
    ul#subjects li a {
        text-decoration: none;
        color: #61afef;
        font-weight: 500;
        transition: color 0.3s ease, text-decoration 0.3s ease;
        display: flex;
        align-items: center;
        background: #21252b;
        padding: 10px;
        border-radius: 5px;
    }
    ul#subjects li a:hover {
        text-decoration: underline;
        color: #98c379;
        background: #3a3f4b;
    }
    ul#subjects li a i {
        margin-right: 8px;
        color: #61afef;
    }
</style>

<div id="content">
    <h1>3º curso del doble grado de Ingeniería Informática y ADE - <span id="year"></span></h1>
    <ul id="subjects"></ul>
</div>

<script>
    // Obtener el año actual
    var currentYear = new Date().getFullYear();
    document.getElementById('year').textContent = currentYear;

    // Añadir asignaturas al listado con enlaces
    var subjects = [
        { name: 'Dirección y Administración de Empresas', url: 'DAE.html' },
        { name: 'Sistemas Concurrentes y Distribuidos', url: 'SCD.html' },
        { name: 'Fundamentos de Redes', url: 'FR.html' },
        { name: 'Programación y Diseño Orientado a Objetos', url: 'PDOO.html' },
        { name: 'Econometría', url: 'ECO.html' },
        { name: 'Contabilidad Financiera 1', url: 'CF1.html' }
    ];
    var subjectsList = document.getElementById('subjects');
    subjects.forEach(function(subject) {
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.textContent = subject.name;
        a.href = subject.url;

        li.appendChild(a);
        subjectsList.appendChild(li);
    });
</script>
